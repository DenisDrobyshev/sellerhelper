services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on: [db, redis]
    command: uvicorn core.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./core:/app/core

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sellercompass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sellercompass}
      POSTGRES_DB: ${POSTGRES_DB:-sellercompass}
    ports:
      - "5434:5432"   # host 5434 to avoid clashing with local Postgres / other projects
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6381:6379"

volumes:
  pgdata:
