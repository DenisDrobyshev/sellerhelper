services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Defaults to SQLite on a persistent volume, so the stack runs with no
      # configuration. To use the bundled Postgres, install psycopg and set:
      # DATABASE_URL: postgresql+psycopg://sellercompass:sellercompass@db:5432/sellercompass
      DATABASE_URL: sqlite:////data/sellercompass.db
    volumes:
      - apidata:/data
    depends_on: [db, redis]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sellercompass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sellercompass}
      POSTGRES_DB: ${POSTGRES_DB:-sellercompass}
    ports:
      - "5434:5432"   # host 5434 to avoid clashing with a local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6381:6379"

volumes:
  apidata:
  pgdata:
